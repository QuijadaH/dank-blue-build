modules:
  - type: dnf
    install:
      packages:
        - dconf
        - desktop-file-utils
        - fastfetch
        - file-roller
        - firewall-config
        - glib2
        - gparted
        - gvfs
        - libgsf 
        - mediainfo
        - nemo
        - nemo-extensions
        - nemo-fileroller
        - nemo-preview 
        - p7zip
        - p7zip-plugins
        - poppler-glib
        - samba-client
        - shared-mime-info 
        - tumbler
        - udisks2
        - unrar
        - webp-pixbuf-loader
        - xdg-user-dirs
        - xdg-utils
        
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
        install: 
          - io.github.kolunmi.Bazaar
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
      - notify: false
        scope: user
        repo:
          title: Flathub (user)
