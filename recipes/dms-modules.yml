modules:
  - type: dnf
    repos:
      copr:
        enable:
          - avengemedia/dms
    install:
      packages:
        - dms
        - dms-greeter    
        
  - type: dnf
    repos:
      copr:
        enable:
          - scottames/ghostty
    install:
      packages:
        - acl
        - cliphist
        - ddcutil
        - ghostty
        - i2c-tools    # Add user to group `i2c`
        - power-profiles-daemon    
        - wl-clipboard

  ### https://danklinux.com/docs/dankgreeter/installation#if-you-installed-the-package-manually ###
  - type: files
    files:
      - source: system   # copies `files/system/*` (* means everything inside it) into your image's root folder `/`
        destination: /
        
  - type: systemd
    system:
      enabled:
        - greetd
    user:
      enabled:
        - dsearch
