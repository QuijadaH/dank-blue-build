modules:
  - type: dnf
    repos:
      copr:
        enable:
          - avengemedia/dms
    install:
      packages:
        - dms
        - dms-greeter    # Add this as well: https://danklinux.com/docs/dankgreeter/installation#if-you-installed-the-package-manually


  
  - type: dnf
    repos:
      copr:
        enable:
          - scottames/ghostty
    install:
      packages:
        - acl
        - cliphist
        - ddcutil
        - ghostty
        - i2c-tools
        - power-profiles-daemon    # Add user to group `i2c`
        - wl-clipboard

  - type: script
    snippets:
      - "dms greeter enable"
