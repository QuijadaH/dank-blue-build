modules:
  - type: dnf
    repos:
      copr:
        enable:
          - ashbuk/Hyprland-Fedora
    install:
      packages:
      - hyprland
      - xdg-desktop-portal-hyprland
      - qt5-qtwayland
      - qt6-qtwayland

  - type: dnf
    install:
      packages:
      - grim
      - kanshi
      - kitty
      - slurp
      - wev
      # - xwaylandvideobridge    # https://wiki.hypr.land/Useful-Utilities/Screen-Sharing/#xwayland
