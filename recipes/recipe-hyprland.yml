---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: dank-blue-build-hyprland
description: Minimal BlueBuild image for Dank Linux and Hyprland.

base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: 43

modules:
  - type: dnf
    install:
      packages:
        - dconf
        - fastfetch
        - glib2
        - mediainfo
        - p7zip
        - p7zip-plugins
        - udisks2
        - unrar
        - xdg-user-dirs
        - xdg-utils

  - from-file: ./hyprland-modules.yml
  - from-file: ./dms-modules.yml
  - from-file: ./desktop-modules.yml

  - type: signing
