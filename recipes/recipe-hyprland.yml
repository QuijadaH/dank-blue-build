---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: dank-blue-build-hyprland
description: Minimal BlueBuild image for Dank Linux and Hyprland.

base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        enable:
          - lionheartp/Hyprland
    install:
      install-weak-deps: false
      packages:
      - hyprland
      - hyprland-guiutils
      - xdg-desktop-portal-hyprland
      - qt5-qtwayland
      - qt6-qtwayland
      - grim
      - slurp
      - wev
      - xwaylandvideobridge    # See https://wiki.hypr.land/Useful-Utilities/Screen-Sharing/#xwayland

  - from-file: ./common/dms-modules.yml
  - from-file: ./common/desktop-modules.yml
        
  - type: systemd
    system:
      enabled:
        - greetd
        - existing-user-skel-init.service
    user:
      enabled:
        - hyprland-session.target
        - dms
        - dsearch

  - type: signing
