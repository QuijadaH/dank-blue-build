modules:
  - type: dnf
    install:
      packages:
        - desktop-file-utils
        - file-roller
        - firewall-config
        - gparted
        - gvfs
        - libgsf 
        - nemo
        - nemo-extensions
        - nemo-fileroller
        - nemo-preview 
        - poppler-glib
        - samba-client
        - shared-mime-info 
        - tumbler
        - webp-pixbuf-loader
        
  - type: default-flatpaks
    configurations:
      - notify: true 
        scope: system
        repo:
          title: Flathub (system)
        install: 
          - io.github.kolunmi.Bazaar
          - io.github.celluloid_player.Celluloid
          - org.mozilla.firefox
          - com.github.tchx84.Flatseal
          - org.gnome.Loupe
          - org.gnome.Papers
          - io.github.flattool.Warehouse
      - scope: user
        repo:
          title: Flathub (user)
