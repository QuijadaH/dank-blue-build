modules:
  - type: dnf
    install:
      packages:
        - file-roller
        - firewall-config
        - gparted
        - gvfs
        - gvfs-afc
        - gvfs-archive
        - gvfs-gphoto2
        - libgsf 
        - nemo
        - nemo-extensions
        - nemo-fileroller
        - nemo-preview 
        - nemo-python
        - nemo-seahorse 
        - nemo-terminal
        - poppler-glib 
        - webp-pixbuf-loader
        
  - type: default-flatpaks
    configurations:
      - notify: true 
        scope: system
        repo:
          title: Flathub (system)
        install: 
          - io.github.kolunmi.Bazaar
          - io.github.celluloid_player.Celluloid
          - org.mozilla.firefox
          - com.github.tchx84.Flatseal
          - org.gnome.Loupe
          - org.gnome.Papers
          - io.github.flattool.Warehouse
      - scope: user
        repo:
          title: Flathub (user)
